name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (strict)
        run: npx tsc --noEmit
        env:
          CI: true

      - name: Lint AI services (eslint)
        run: |
          npx eslint services/ai --ext .ts || true
        # Note: remove "|| true" to make lint failure fail the job once you have rules you want enforced.

      - name: Run Jest tests (if present)
        run: |
          # Prefer to run tests with local Jest if installed; fail job on test errors.
          if npx -y jest --version > /dev/null 2>&1; then
            npx jest --runInBand --detectOpenHandles
          else
            echo "Jest not installed — skipping JS/TS tests"
          fi
